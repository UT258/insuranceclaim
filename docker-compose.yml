      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-registry:8761/eureka/

  api-gateway:
    build: ./services/api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - service-registry
      - identity-service
      - analytics-service
      - notification-service
      - claims-service
      - data-ingestion-service
      - fraud-risk-service
      - denial-analysis-service
      - performance-analytics-service
      - cost-reserve-service
      - dashboard-service
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://service-registry:8761/eureka/

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway
    environment:
      VITE_API_BASE_URL: http://api-gateway:8080

volumes:
  mysql-data:

